<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self' data: blob:;
  script-src 'unsafe-inline';
  frame-src https://inv.nadeko.net https://invidious.fdn.fr https://yt.cdaut.de https://www.youtube.com;
  style-src 'unsafe-inline';
"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>
<script>
  var v = new URLSearchParams(location.search).get('v');
  if (v && /^[\w\-]{10,64}$/.test(v)) {
    var INSTANCES = [
      'https://inv.nadeko.net',
      'https://invidious.fdn.fr',
      'https://yt.cdaut.de'
    ];
    var idx = 0;
    function tryNext() {
      if (idx >= INSTANCES.length) return;
      var f = document.createElement('iframe');
      f.setAttribute('allow', 'autoplay; encrypted-media; fullscreen');
      f.src = INSTANCES[idx] + '/embed/' + v + '?autoplay=1&listen=0&local=true';
      f.onload = function() {
        // success — remove any pending fallback
        document.querySelectorAll('iframe:not(:last-child)').forEach(function(el){ el.remove(); });
      };
      document.body.appendChild(f);
      idx++;
    }
    tryNext();
  }
</script>
</body>
</html>
